
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>What will you do if...?</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: #f5f7fb;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    color: #1B2D5A;
  }

  h1 {
    font-size: 2rem;
    font-weight: 700;
    margin-bottom: 0.3rem;
  }
  h1 span { color: #EC6E1F; }

  .subtitle {
    color: #475569;
    font-size: 0.95rem;
    margin-bottom: 2rem;
  }

  .card-container {
    perspective: 800px;
    width: 460px;
    height: 260px;
    cursor: pointer;
    margin-bottom: 1.5rem;
  }

  .card {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.5s ease;
  }

  .card.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    text-align: center;
  }

  .card-front {
    background: #1B2D5A;
    flex-direction: column;
    gap: 0.8rem;
    box-shadow: 0 8px 30px rgba(27, 45, 90, 0.25);
  }

  .card-front .tap-text {
    color: rgba(255,255,255,0.7);
    font-size: 1rem;
    font-weight: 400;
  }

  .card-front .logo-front {
    font-size: 2rem;
    color: rgba(255,255,255,0.85);
  }
  .card-front .logo-front b { color: white; font-weight: 700; }
  .card-front .logo-front span { color: #EC6E1F; font-weight: 700; }

  .card-front .logo-sub {
    font-size: 0.65rem;
    color: rgba(255,255,255,0.4);
    letter-spacing: 3px;
    margin-top: -0.3rem;
  }

  .card-back {
    background: #FCE9D7;
    transform: rotateY(180deg);
    box-shadow: 0 8px 30px rgba(236, 110, 31, 0.2);
    border-left: 6px solid #EC6E1F;
  }

  .card-back .situation-text {
    font-size: 1.55rem;
    font-weight: 700;
    color: #1B2D5A;
    line-height: 1.4;
    transition: opacity 0.18s ease;
  }

  .counter {
    color: #94A3B8;
    font-size: 0.85rem;
    margin-bottom: 1rem;
  }

  .counter strong { color: #EC6E1F; }

  .btn-row { display: flex; gap: 0.75rem; }

  button {
    border: none;
    border-radius: 8px;
    padding: 0.7rem 1.6rem;
    font-family: inherit;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }
  button:active { transform: scale(0.97); }

  .btn-next {
    background: #1B2D5A;
    color: white;
  }
  .btn-next:hover { background: #253d75; }
  .btn-next:disabled {
    background: #94A3B8;
    cursor: default;
    transform: none;
  }

  .btn-reset {
    background: white;
    color: #1B2D5A;
    border: 2px solid #E2E8F0;
  }
  .btn-reset:hover { border-color: #94A3B8; }

  .done-message {
    color: #2E8B57;
    font-weight: 600;
    font-size: 1rem;
    margin-bottom: 1rem;
  }

  .logo {
    margin-top: 2.5rem;
    font-size: 0.85rem;
    color: #94A3B8;
  }
  .logo b { color: #1B2D5A; }
  .logo span { color: #EC6E1F; font-weight: 700; }

  @media (max-width: 520px) {
    .card-container { width: 100%; height: 220px; }
    .card-back .situation-text { font-size: 1.25rem; }
    h1 { font-size: 1.5rem; }
  }
</style>
</head>
<body>

<h1>What will you do <span>if...?</span></h1>
<p class="subtitle">Click the card to reveal a situation</p>

<div class="card-container" id="cardContainer">
  <div class="card" id="card">
    <div class="card-face card-front">
      <div class="logo-front"><b>Weekend</b> <span>outing</span></div>
      <div class="logo-sub">Things happen!</div>
      <div class="tap-text">Tap to flip</div>
    </div>
    <div class="card-face card-back">
      <div class="situation-text" id="situationText"></div>
    </div>
  </div>
</div>

<div class="counter" id="counter"></div>
<div class="done-message" id="doneMessage" style="display:none;">All cards used! Reset to play again.</div>

<div class="btn-row">
  <button class="btn-next" id="nextBtn">Next card</button>
  <button class="btn-reset" id="resetBtn">Reset</button>
</div>

<div class="logo"><b>oxford</b> <span>house</span> &middot; language courses</div>

<script>
const ALL_SITUATIONS = [
  "A seagull steals your sandwich.",
  "You forget the sunscreen and your face turns red.",
  "A famous actor sits next to you on the train.",
  "Your friend falls asleep on the beach and misses lunch.",
  "A dog runs away with your towel and bag.",
  "Your car breaks down.",
  "The restaurant is full when you go for lunch.",
  "You lose your phone.",
  "You forget to bring your wallet.",
  "The train is cancelled.",
  "You forget your swimsuit.",
  "The beach is too crowded.",
  "Your partner feels sick.",
  "You see a shark in the water."
];

let remaining = [];
let used = 0;
let isFlipped = false;

const card = document.getElementById('card');
const container = document.getElementById('cardContainer');
const situationText = document.getElementById('situationText');
const counter = document.getElementById('counter');
const doneMessage = document.getElementById('doneMessage');
const nextBtn = document.getElementById('nextBtn');
const resetBtn = document.getElementById('resetBtn');

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function reset() {
  remaining = shuffle(ALL_SITUATIONS);
  used = 0;
  isFlipped = false;
  card.classList.remove('flipped');
  situationText.textContent = '';
  situationText.style.opacity = '1';
  nextBtn.disabled = false;
  nextBtn.textContent = 'Next card';
  doneMessage.style.display = 'none';
  updateCounter();
}

function updateCounter() {
  counter.innerHTML = `<strong>${used}</strong> / ${ALL_SITUATIONS.length} cards used`;
}

function showNextSituation() {
  if (remaining.length === 0) return;

  const situation = remaining.pop();
  used++;

  if (!isFlipped) {
    // First card: do the flip
    situationText.textContent = situation;
    isFlipped = true;
    card.classList.add('flipped');
  } else {
    // Subsequent cards: fade out fully, replace content, fade back in
    situationText.style.opacity = '0';
    setTimeout(() => {
      situationText.textContent = '';
      situationText.textContent = situation;
      situationText.style.opacity = '1';
    }, 180);
  }

  updateCounter();

  if (remaining.length === 0) {
    nextBtn.disabled = true;
    doneMessage.style.display = 'block';
  }
}

container.addEventListener('click', showNextSituation);
nextBtn.addEventListener('click', showNextSituation);
resetBtn.addEventListener('click', reset);

reset();
</script>
</body>
</html>
